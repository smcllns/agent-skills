name: skills-sync

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run sync
        run: bash scripts/sync-skills.sh
      - name: Verify no drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Plugin-embedded skill copies are out of sync with skills/. Run scripts/sync-skills.sh locally and commit the result."
            exit 1
          fi
